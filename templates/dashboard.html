<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Control Interface</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Courier', monospaced;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin: 0;
            padding: 0;
            background: black;
            color: #333;
        }

        /* Header Styles */
        header {
            background: url("{{ url_for('static', filename='remotebgimge.avif') }}") no-repeat center center fixed;
            background-size: cover;
            background-position: center;
            color: white;
            padding: 50px 0;
        }

        header h1 {
            font-size: 3em;
            margin: 0;
        }

        header hr {
            border: 1px solid #fff;
            width: 50%;
            margin: 20px auto;
        }

        /* Joystick Container */
        .joystick-container {
            display: inline-block;
            margin: 20px;
        }

        .joystick {
            width: 128px;
            height: 128px;
            position: relative;
            margin: auto;
        }

        /* Joystick Stick */
        #stick1, #stick2 {
            width: 64px;
            height: 64px;
            position: absolute;
            top: 32px;
            left: 32px;
        }

        /* Button Styles */
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Live Stream and Canvas Styles */
        #videoStream {
            border: 2px solid black;
            width: 320px;
            height: 240px;
        }

        canvas {
            display: none;
        }

        /* Status Info */
        #status1, #status2 {
            font-size: 18px;
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>Drone Control Interface</h1>
<hr>
<div id="status1" style="color: red;">Throttle: 0, Yaw: 0</div>
<div id="status2" style="color: blue;">Pitch: 0, Roll: 0</div>
<hr>

<!-- Video Stream from ESP32-CAM -->
<div>
    <h2>Live Stream</h2>
    <img id="videoStream" src="" alt="Live Stream" style="width: 320px; height: 240px; border: 2px solid black;">
</div>

<!-- Screenshot Capture Button -->
<button id="captureButton">Capture Screenshot</button>

<!-- Process Image Button -->
<button id="processButton">Process Image</button>

<br>
<canvas id="screenshotCanvas" style="display: none;"></canvas>

<div class="joystick-container">
    <h2>Throttle / Yaw</h2>
    <div style="border: 1px solid red;" class="joystick">
        <img src="{{ url_for('static', filename='joystick-base(1).png') }}" alt="Joystick Base">
        <div id="stick1">
            <img src="{{ url_for('static', filename='joystick-red(1).png') }}" alt="Joystick">
        </div>
    </div>
</div>

<div class="joystick-container">
    <h2>Pitch / Roll</h2>
    <div style="border: 1px solid blue;" class="joystick">
        <img src="{{ url_for('static', filename='joystick-base(1).png') }}" alt="Joystick Base">
        <div id="stick2">
            <img src="{{ url_for('static', filename='joystick-blue(1).png') }}" alt="Joystick">

        </div>
    </div>
</div>

<br>
<button id="stopButton">STOP</button>

<script>
// ESP32 IP addresses (replace with your drone's IP and ESP32-CAM IP)
const droneIP = 'http://192.168.237.60';
const cameraIP = 'http://192.168.97.88'; // Replace with the actual IP address of your ESP32-CAM

// Function to update the video stream from the ESP32-CAM
function updateVideoStream() {
    document.getElementById("videoStream").src = `${cameraIP}:81/stream`;
}

// Call the function to load the live stream
updateVideoStream();

// Function to send commands to the drone
function sendCommand(path) {
    fetch(droneIP + path)
        .then(response => console.log("Command sent:", path))
        .catch(err => console.log("Error:", err));
}

// Capture Screenshot Functionality
document.getElementById("captureButton").addEventListener("click", function () {
    const videoElement = document.getElementById("videoStream");
    const canvas = document.getElementById("screenshotCanvas");
    const context = canvas.getContext("2d");

    // Set canvas dimensions to match the video element
    canvas.width = videoElement.width;
    canvas.height = videoElement.height;

    // Draw the current frame of the video onto the canvas
    context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

    // Get the data URL of the canvas image
    const screenshotData = canvas.toDataURL("image/png");

    // Create a temporary link to download the screenshot
    const link = document.createElement("a");
    link.href = screenshotData;
    link.download = "screenshot.png";
    link.click();
});

// Process Image Functionality
document.getElementById("processButton").addEventListener("click", function () {
    // Redirect to the /process route
    window.location.href = "/process";
});

// Joystick Controller Class
class JoystickController {
    constructor(stickID, maxDistance, deadzone) {
        this.id = stickID;
        let stick = document.getElementById(stickID);

        this.dragStart = null;
        this.touchId = null;
        this.active = false;
        this.value = { x: 0, y: 0 };

        let self = this;

        function handleDown(event) {
            self.active = true;
            stick.style.transition = '0s';
            event.preventDefault();

            if (event.changedTouches)
                self.dragStart = { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
            else
                self.dragStart = { x: event.clientX, y: event.clientY };

            if (event.changedTouches)
                self.touchId = event.changedTouches[0].identifier;
        }

        function handleMove(event) {
            if (!self.active) return;
            let touchmoveId = null;
            if (event.changedTouches) {
                for (let i = 0; i < event.changedTouches.length; i++) {
                    if (self.touchId == event.changedTouches[i].identifier) {
                        touchmoveId = i;
                        event.clientX = event.changedTouches[i].clientX;
                        event.clientY = event.changedTouches[i].clientY;
                    }
                }
                if (touchmoveId == null) return;
            }

            const xDiff = event.clientX - self.dragStart.x;
            const yDiff = event.clientY - self.dragStart.y;
            const angle = Math.atan2(yDiff, xDiff);
            const distance = Math.min(maxDistance, Math.hypot(xDiff, yDiff));
            const xPosition = distance * Math.cos(angle);
            const yPosition = distance * Math.sin(angle);

            stick.style.transform = `translate3d(${xPosition}px, ${yPosition}px, 0px)`;

            const distance2 = (distance < deadzone) ? 0 : maxDistance / (maxDistance - deadzone) * (distance - deadzone);
            const xPosition2 = distance2 * Math.cos(angle);
            const yPosition2 = distance2 * Math.sin(angle);
            const xPercent = parseFloat((xPosition2 / maxDistance).toFixed(4));
            const yPercent = parseFloat((yPosition2 / maxDistance).toFixed(4));

            self.value = { x: xPercent, y: yPercent };
        }

        function handleUp(event) {
            if (!self.active) return;
            if (event.changedTouches && self.touchId != event.changedTouches[0].identifier) return;

            stick.style.transition = '.2s';
            stick.style.transform = 'translate3d(0px, 0px, 0px)';

            self.value = { x: 0, y: 0 };
            self.touchId = null;
            self.active = false;
        }

        stick.addEventListener('mousedown', handleDown);
        stick.addEventListener('touchstart', handleDown);
        document.addEventListener('mousemove', handleMove, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('mouseup', handleUp);
        document.addEventListener('touchend', handleUp);
    }
}

// Initialize Joysticks
let joystick1 = new JoystickController("stick1", 64, 8);
let joystick2 = new JoystickController("stick2", 64, 8);

// Update Function
function update() {
    // Joystick 1: Throttle (Y-axis) and Yaw (X-axis)
    let throttle = (joystick1.value.y).toFixed(2);
    let yaw = (joystick1.value.x).toFixed(2);
    document.getElementById("status1").innerText = `Throttle: ${throttle}, Yaw: ${yaw}`;

    // Send throttle and yaw values to drone
    sendCommand(`/throttle/set?value=${throttle}`);
    sendCommand(`/yaw/set?value=${yaw}`);

    // Joystick 2: Pitch (Y-axis) and Roll (X-axis)
    let pitch = (joystick2.value.y).toFixed(2);
    let roll = (joystick2.value.x).toFixed(2);
    document.getElementById("status2").innerText = `Pitch: ${pitch}, Roll: ${roll}`;

    // Send pitch and roll values to drone
    sendCommand(`/pitch/set?value=${pitch}`);
    sendCommand(`/roll/set?value=${roll}`);

    // Repeat the update loop
    requestAnimationFrame(update);
}

// Start the update loop
update();
</script>

</body>
</html>
